<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – QSkill Task 1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f17;
  --card:#17172a;
  --border:#2a2a45;
  --blue:#5b6ef5;
  --blue-light:#7c8bf7;
  --text:#e8e8f0;
  --muted:#8888aa;
  --error:#f56565;
  --success:#48bb78;
  --warn:#ed8936;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* Animated background blobs */
.blob{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.25;
  animation:float 8s ease-in-out infinite;
  pointer-events:none;
}
.blob-1{width:400px;height:400px;background:#5b6ef5;top:-100px;left:-100px;animation-delay:0s}
.blob-2{width:300px;height:300px;background:#a855f7;bottom:-80px;right:-80px;animation-delay:3s}
.blob-3{width:200px;height:200px;background:#06b6d4;top:40%;right:10%;animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

/* Card */
.card{
  position:relative;z-index:2;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 44px;
  width:100%;max-width:440px;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}

/* Logo */
.logo{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-bottom:32px;
}
.logo-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,#5b6ef5,#a855f7);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.logo-text{font-size:20px;font-weight:800;color:var(--text)}

/* Heading */
.card-title{font-size:26px;font-weight:800;color:var(--text);text-align:center;margin-bottom:6px}
.card-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px}

/* Form fields */
.field{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;letter-spacing:.3px}
.input-wrap{position:relative}
input[type=text],input[type=email],input[type=password]{
  width:100%;padding:13px 16px 13px 44px;
  background:#0f0f1e;
  border:1.5px solid var(--border);
  border-radius:10px;
  font-size:15px;font-family:'Inter',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,110,245,.15)}
input.error-input{border-color:var(--error)!important}
input.success-input{border-color:var(--success)!important}
.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;pointer-events:none;
}
.eye-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  cursor:pointer;font-size:16px;user-select:none;opacity:.6;
  transition:opacity .2s;
}
.eye-toggle:hover{opacity:1}
.field-msg{font-size:12px;margin-top:6px;min-height:16px;transition:all .2s}
.field-msg.err{color:var(--error)}
.field-msg.ok{color:var(--success)}

/* Password strength */
.strength-bar{display:flex;gap:4px;margin-top:8px}
.strength-seg{height:4px;flex:1;border-radius:2px;background:#2a2a45;transition:background .3s}

/* Remember + Forgot */
.row-check{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.remember input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.forgot{font-size:13px;color:var(--blue-light);text-decoration:none;font-weight:500}
.forgot:hover{text-decoration:underline}

/* Submit button */
.btn-submit{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--blue),#7c5af5);
  color:#fff;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
  border:none;border-radius:10px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,110,245,.45)}
.btn-submit:active{transform:translateY(0)}
.btn-submit.loading::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.12);
  animation:shimmer 1s ease infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--muted)}

/* Social buttons */
.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btn-social{
  padding:11px;background:#0f0f1e;border:1.5px solid var(--border);
  border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  color:var(--text);font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.btn-social:hover{border-color:var(--blue);background:#17172a}

/* Sign up link */
.signup-row{text-align:center;font-size:14px;color:var(--muted);margin-top:20px}
.signup-row a{color:var(--blue-light);font-weight:600;text-decoration:none}
.signup-row a:hover{text-decoration:underline}

/* Toast */
.toast{
  position:fixed;top:24px;right:24px;z-index:9999;
  background:#17172a;border:1px solid var(--border);
  border-radius:12px;padding:16px 22px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.4);
  transform:translateX(120%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  max-width:320px;
}
.toast.show{transform:translateX(0)}
.toast-icon{font-size:20px}
.toast-text{font-size:14px;font-weight:600;color:var(--text)}
.toast-sub{font-size:12px;color:var(--muted);margin-top:2px}
.toast.success{border-color:var(--success)}
.toast.error-toast{border-color:var(--error)}
</style>
</head>
<body>

<!-- Animated background -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">✅</div>
  <div><div class="toast-text" id="toast-text"></div><div class="toast-sub" id="toast-sub"></div></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">QSkill</div>
  </div>

  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Sign in to your account to continue</p>

  <!-- Social logins -->
  <div class="social-btns">
    <button class="btn-social" onclick="showToast('info','Google Login','OAuth integration needed','⚙️')">
      <span>🔵</span> Google
    </button>
    <button class="btn-social" onclick="showToast('info','GitHub Login','OAuth integration needed','⚙️')">
      <span>⚫</span> GitHub
    </button>
  </div>

  <div class="divider"><span>or continue with email</span></div>

  <form id="loginForm" novalidate>
    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" oninput="validateEmail()"/>
      </div>
      <div class="field-msg" id="email-msg"></div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" oninput="validatePassword()"/>
        <span class="eye-toggle" id="eye" onclick="toggleEye()">👁️</span>
      </div>
      <div class="strength-bar" id="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="field-msg" id="pass-msg"></div>
    </div>

    <div class="row-check">
      <label class="remember"><input type="checkbox" id="remember"/> Remember me</label>
      <a class="forgot" href="#" onclick="forgotPassword()">Forgot password?</a>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Sign In →</button>
  </form>

  <div class="signup-row">Don't have an account? <a href="#" onclick="showToast('info','Registration','Sign up page coming soon!','🚀')">Create one free</a></div>
</div>

<script>
// ===== VALIDATION HELPERS =====
const $ = id => document.getElementById(id);

function setField(inputId, msgId, type, msg) {
  const inp = $(inputId), el = $(msgId);
  inp.classList.remove('error-input','success-input');
  if(type==='err'){inp.classList.add('error-input');el.className='field-msg err';el.textContent='⚠ '+msg;}
  else if(type==='ok'){inp.classList.add('success-input');el.className='field-msg ok';el.textContent='✓ '+msg;}
  else{el.className='field-msg';el.textContent='';}
}

// ===== EMAIL VALIDATION =====
function validateEmail() {
  const val = $('email').value.trim();
  if(!val){ setField('email','email-msg','',''); return false; }
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!re.test(val)){ setField('email','email-msg','err','Enter a valid email address'); return false; }
  setField('email','email-msg','ok','Looks good!');
  return true;
}

// ===== PASSWORD VALIDATION + STRENGTH =====
function validatePassword() {
  const val = $('password').value;
  const segs = ['s1','s2','s3','s4'];
  const colors = ['#f56565','#ed8936','#ecc94b','#48bb78'];
  const labels = ['Too weak','Fair','Good','Strong'];

  if(!val){ segs.forEach(s=>$(s).style.background=''); setField('password','pass-msg','',''); return false; }

  let score = 0;
  if(val.length >= 8) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;

  segs.forEach((s,i) => {
    $(s).style.background = i < score ? colors[score-1] : '#2a2a45';
  });

  if(val.length < 6){ setField('password','pass-msg','err','Password must be at least 6 characters'); return false; }
  setField('password','pass-msg','ok', labels[score-1] || 'Weak' );
  return score >= 1;
}

// ===== EYE TOGGLE =====
function toggleEye(){
  const inp = $('password'), eye = $('eye');
  if(inp.type==='password'){ inp.type='text'; eye.textContent='🙈'; }
  else { inp.type='password'; eye.textContent='👁️'; }
}

// ===== FORGOT PASSWORD =====
function forgotPassword(){
  const email = $('email').value.trim();
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    alert('⚠️ Please enter a valid email address first, then click Forgot Password.');
    $('email').focus();
    return;
  }
  showToast('success','Reset Email Sent','Check '+email+' for reset instructions','📬');
}

// ===== TOAST =====
let toastTimer;
function showToast(type, title, sub, icon){
  const t = $('toast');
  $('toast-icon').textContent = icon || (type==='success'?'✅':'❌');
  $('toast-text').textContent = title;
  $('toast-sub').textContent = sub;
  t.className = 'toast show ' + (type==='success'?'success': type==='error'?'error-toast':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}

// ===== FORM SUBMIT =====
$('loginForm').addEventListener('submit', function(e){
  e.preventDefault();

  const emailOk = validateEmail();
  const passOk = validatePassword();

  if(!emailOk || !passOk){
    // Show alert as required by task
    alert('⚠️ Form Validation Failed!\n\n' + (!emailOk ? '• Please enter a valid email address.\n' : '') + (!passOk ? '• Password must be at least 6 characters.\n' : '') + '\nPlease fix the errors and try again.');
    return;
  }

  const btn = $('submitBtn');
  btn.classList.add('loading');
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  // Simulate API call
  setTimeout(()=>{
    btn.classList.remove('loading');
    btn.textContent = 'Sign In →';
    btn.disabled = false;

    // Demo: test@qskill.com / Password123!
    const email = $('email').value.trim();
    const pass = $('password').value;
    if(email === 'test@qskill.com' && pass === 'Password123!'){
      showToast('success','Login Successful!','Welcome back to QSkill 🎉','✅');
      alert('✅ Login Successful!\n\nWelcome back! You are now logged in.');
    } else {
      showToast('error','Login Failed','Invalid email or password','❌');
      alert('❌ Login Failed!\n\nInvalid email or password.\n\nHint: Use\nEmail: test@qskill.com\nPassword: Password123!');
      setField('email','email-msg','err','Invalid credentials');
      setField('password','pass-msg','err','Invalid credentials');
    }
  }, 1500);
});
</script>
</body>
</html>
